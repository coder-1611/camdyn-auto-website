<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<nav style="position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:20px;padding:0 clamp(16px,4vw,52px);height:74px;background:var(--nav-bg,rgba(11,11,13,0.86));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line,rgba(255,255,255,0.09))">
  <a href="index.dc.html" style="display:flex;align-items:center;gap:13px;text-decoration:none;flex:none">
    <span style="display:flex;align-items:center;justify-content:center;width:42px;height:42px;background:#FFB020;color:#0b0b0d;font:400 30px/1 'Anton',sans-serif;clip-path:polygon(0 0,100% 0,100% 74%,74% 100%,0 100%)">C</span>
    <span style="display:flex;flex-direction:column;line-height:1">
      <span style="font:400 20px/0.92 'Anton',sans-serif;letter-spacing:0.02em;color:var(--ink,#f4f4f2);text-transform:uppercase">Camdyn</span>
      <span style="font:700 9px/1 'Space Mono',monospace;letter-spacing:0.34em;color:var(--amber-ink,#FFB020);margin-top:3px">AUTO&nbsp;REPAIR</span>
    </span>
  </a>
  <div style="display:flex;align-items:center;gap:2px">
    <sc-for list="{{ links }}" as="link" hint-placeholder-count="6">
      <a href="{{ link.href }}" style="{{ link.style }}" style-hover="background:var(--line,rgba(255,255,255,0.07))">{{ link.label }}</a>
    </sc-for>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex:none">
    <button onClick="{{ toggleTheme }}" title="Toggle light / dark" aria-label="Toggle light and dark mode" style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;background:transparent;border:1px solid var(--line2,rgba(255,255,255,0.15));border-radius:3px;color:var(--ink,#f4f4f2);cursor:pointer;padding:0" style-hover="border-color:#FFB020;color:#FFB020">{{ themeIcon }}</button>
    <a href="tel:5123888993" style="display:flex;align-items:center;gap:9px;text-decoration:none;background:#FFB020;color:#0b0b0d;font:700 13px/1 'Barlow Condensed',sans-serif;letter-spacing:0.1em;text-transform:uppercase;padding:11px 18px;border-radius:3px" style-hover="background:#ffc247">
      <span style="width:7px;height:7px;border-radius:50%;background:#0b0b0d;box-shadow:0 0 0 4px rgba(11,11,13,0.18)"></span>512.388.8993
    </a>
  </div>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;about&quot;,&quot;savings&quot;,&quot;reviews&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { theme: 'dark' };
  componentDidMount() {
    let t = 'dark';
    try { t = document.documentElement.getAttribute('data-theme') || localStorage.getItem('car-theme') || 'dark'; } catch (e) {}
    if (t !== this.state.theme) this.setState({ theme: t });
  }
  icon(theme) {
    const p = { width: 19, height: 19, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' };
    if (theme === 'light') {
      // moon (click -> go dark)
      return React.createElement('svg', p, React.createElement('path', { d: 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z' }));
    }
    // sun (click -> go light)
    return React.createElement('svg', p,
      React.createElement('circle', { cx: 12, cy: 12, r: 4 }),
      React.createElement('path', { d: 'M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4' }));
  }
  renderVals() {
    const active = this.props.active || '';
    const items = [
      ['Home','index.dc.html','home'],
      ['Services','services.dc.html','services'],
      ['About','about.dc.html','about'],
      ['Savings','savings.dc.html','savings'],
      ['Reviews','reviews.dc.html','reviews'],
      ['Contact','contact.dc.html','contact'],
    ];
    const links = items.map(([label, href, key]) => {
      const on = key === active;
      return { label, href, style: {
        textDecoration: 'none',
        font: "600 13.5px/1 'Barlow Condensed', sans-serif",
        letterSpacing: '0.14em',
        textTransform: 'uppercase',
        color: on ? 'var(--amber-ink,#FFB020)' : 'var(--ink-soft,#cfcfce)',
        padding: '9px 13px',
        borderRadius: '3px',
        borderBottom: on ? '2px solid #FFB020' : '2px solid transparent',
        transition: 'color .15s, background .15s',
      }};
    });
    const theme = this.state.theme;
    return {
      links,
      themeIcon: this.icon(theme),
      toggleTheme: () => {
        const next = theme === 'light' ? 'dark' : 'light';
        try {
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('car-theme', next);
        } catch (e) {}
        this.setState({ theme: next });
      },
    };
  }
}
</script>
</body>
</html>
